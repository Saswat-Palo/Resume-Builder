<!DOCTYPE html>
<html>
<head>
  <div id="intro-screen">
  <div class="intro-content">
    <div class="intro-text-top">Resume</div>
    <div class="intro-builder-container">
      <span class="dumbbell left">💪</span>
      <div class="intro-text-bottom">Astra</div>
      <span class="dumbbell right">💪</span>
    </div>
  </div>
</div>
  <title>Resume Astra</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<h1>Resume Astra</h1>

<div class="container">
  <div class="form">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="e.g. YOUR NAME" oninput="generateResume()">
    
    <label>Education (Press Enter for a new entry)</label>
    <textarea id="education" placeholder="UG Degree - University Name (From-To YEAR)&#10;High School Diploma - School Name (2020)" oninput="generateResume()"></textarea>

    <label>Skills (Comma separated)</label>
    <textarea id="skills" placeholder="HTML, CSS, JavaScript, Python" oninput="generateResume()"></textarea>
    
    <label>Projects (Press Enter for a new project)</label>
    <textarea id="projects" placeholder="Portfolio Website&#10;E-commerce App" oninput="generateResume()"></textarea>

    <div class="button-group">
      <button class="btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="btn-secondary" onclick="saveResume()">💾 Save Resume</button>
    </div>
  </div>

  <div class="preview" id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
